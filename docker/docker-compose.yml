# ─────────────────────────────────────────────────────────────
# Botlixio — Development Docker Compose
# Starts: PostgreSQL 16 + Redis 7 + Backend API
#
# Credentials are read from the root .env file — NOT hardcoded.
# Run: cp .env.example .env  (then fill in real values)
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d          # start all
#   docker compose -f docker/docker-compose.yml up -d postgres redis  # infra only
#   docker compose -f docker/docker-compose.yml logs -f backend        # tail logs
#   docker compose -f docker/docker-compose.yml down -v                # stop + wipe volumes
# ─────────────────────────────────────────────────────────────

services:
  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: botlixio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: botlixio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: botlixio_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: botlixio_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override DB/Redis URLs to point at the Docker service names
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount source for live reload in dev (remove in prod)
      - ../backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
